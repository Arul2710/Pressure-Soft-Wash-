<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Pressure Wash Service</title>
    <script src="tailwind.js"></script>
    <link rel="icon" type="img/jpg" href="img/growwpark-logo.jpg">
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        @keyframes spray {
            0% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 0.2; }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .animate-spray { animation: spray 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-blue-50 font-sans antialiased">

    <div class="min-h-screen flex items-center justify-center px-4 relative overflow-hidden">
        
        <!-- Background Decorative Water Drops -->
        <div class="absolute top-10 left-10 w-20 h-20 bg-blue-200 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-spray"></div>
        <div class="absolute bottom-10 right-10 w-32 h-32 bg-blue-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-spray" style="animation-delay: 1s;"></div>

        <div class="max-w-xl w-full text-center z-10">
            
            <!-- Icon & 404 Section -->
            <div class="relative flex justify-center items-center mb-10">
                <h1 class="text-[150px] font-black text-blue-100 select-none">404</h1>
                
                <div class="absolute animate-float">
                    <!-- Pressure Washer Gun SVG -->
                    <svg class="w-32 h-32 text-blue-600 drop-shadow-2xl" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 13.5V3.75m0 0L8.25 7.5m3.75-3.75L15.75 7.5"></path>
                    </svg>
                </div>
            </div>

            <!-- Content -->
            <div class="space-y-6">
                <h2 class="text-4xl font-extrabold text-slate-800 tracking-tight">
                    Dirt Gone, Page Gone!
                </h2>
                <p class="text-lg text-slate-600 max-w-md mx-auto">
                    Namba <span class="font-bold text-blue-600 italic">Pressure Washing</span> service la dirt ellam clean panra madhiri, nenga theduna page-um clean aairuchu!
                </p>

                <!-- Action Button -->
                <div class="pt-6">
                    <a href="/" class="inline-block px-10 py-4 bg-blue-600 text-white font-bold text-lg rounded-full shadow-2xl hover:bg-blue-700 transition-all transform hover:-translate-y-1 active:scale-95">
                        Back to Fresh Start
                    </a>
                </div>

                <!-- Footer Info -->
                <div class="mt-12 pt-8 border-t border-blue-200">
                    <p class="text-blue-500 font-semibold tracking-widest uppercase text-xs">
                        Premium Soft Washing & Pressure Cleaning
                    </p>
                    <div class="flex justify-center space-x-6 mt-4 text-sm font-medium text-slate-500">
                        <a href="#" class="hover:text-blue-600">Our Services</a>
                        <a href="#" class="hover:text-blue-600">Contact Us</a>
                        <a href="#" class="hover:text-blue-600">Free Quote</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
