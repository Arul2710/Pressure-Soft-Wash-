<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pressure & Soft Wash • Login</title>
    <link rel="icon" type="img/jpg" href="img/growwpark-logo.jpg">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <!-- custom override & smooth extras -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* custom aqua blue shimmer animation */
        @keyframes aquaPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 172, 193, 0.3), 0 0 0 0 rgba(2, 136, 209, 0.2);
            }
            70% {
                box-shadow: 0 0 0 12px rgba(0, 172, 193, 0), 0 0 0 6px rgba(2, 136, 209, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(0, 172, 193, 0), 0 0 0 0 rgba(2, 136, 209, 0);
            }
        }

        .aqua-glow-btn {
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .aqua-glow-btn:hover {
            transform: translateY(-2px);
            animation: aquaPulse 1.2s infinite;
        }
        
        /* Keyboard focus-visible for accessibility */
        *:focus-visible {
            outline: 2px solid #0288d1;
            outline-offset: 2px;
        }
        
        /* custom scroll */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #eef2ff;
        }
        ::-webkit-scrollbar-thumb {
            background: #0288d1;
            border-radius: 12px;
        }
        
        /* RTL safe margins */
        [dir="rtl"] .rtl-flip {
            transform: scaleX(-1);
        }
        [dir="rtl"] .rtl-flip-icon {
            display: inline-block;
            transform: rotate(180deg);
        }

        [dir="rtl"] .pl-11 {
            padding-left: 1rem;
            padding-right: 2.75rem;
        }
        [dir="rtl"] .left-0 {
            left: auto;
            right: 0;
        }
        [dir="rtl"] .pr-12 {
            padding-right: 1rem;
            padding-left: 3rem;
        }
        [dir="rtl"] .right-0 {
            right: auto;
            left: 0;
        }
        [dir="rtl"] .text-left {
            text-align: right;
        }

        :root {
            --nb-blue-600: #2563eb;
            --nb-slate-900: #0f172a;
            --nb-font: 'Plus Jakarta Sans', system-ui, sans-serif;
            --nb-ease: cubic-bezier(0.4, 0, 0.2, 1);
            --nb-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --nb-t-fast: 0.18s;
            --nb-t: 0.28s;
        }
        
        /* ── Logo ── */
        .nb-logo {
            display: flex;
            align-items: center;
            gap: 11px;
            text-decoration: none;
            flex-shrink: 0;
            transition: opacity var(--nb-t-fast);
        }
        .nb-logo:hover { opacity: 0.88; }

        .nb-logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 18px rgba(37, 99, 235, 0.38);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
            transition: transform var(--nb-t) var(--nb-spring),
                        box-shadow var(--nb-t) var(--nb-ease);
        }

        .nb-logo-icon::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent 340deg, rgba(255,255,255,0.25) 360deg);
            animation: nb-spin 6s linear infinite;
        }

        @keyframes nb-spin { to { transform: rotate(360deg); } }

        .nb-logo:hover .nb-logo-icon {
            transform: scale(1.07) rotate(-4deg);
            box-shadow: 0 8px 28px rgba(37, 99, 235, 0.48);
        }

        .nb-logo-svg {
            position: relative;
            z-index: 1;
        }

        .nb-logo-text { display: flex; flex-direction: column; line-height: 1.15; }

        .nb-logo-name {
            font-family: var(--nb-font);
            font-size: 18px;
            font-weight: 800;
            color: var(--nb-blue-600);
            letter-spacing: -0.03em;
            white-space: nowrap;
        }

        .nb-logo-tag {
            font-family: var(--nb-font);
            font-size: 10px;
            font-weight: 600;
            color: var(--nb-blue-600);
            letter-spacing: 0.09em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        @media (max-width: 640px) {
            .nb-logo-icon { width: 36px; height: 36px; border-radius: 10px; }
            .nb-logo-name { font-size: 16px; }
            .nb-logo-tag { font-size: 9px; }
        }

        @media (max-width: 480px) {
            .nb-logo-icon { width: 32px; height: 32px; border-radius: 8px; }
            .nb-logo-name { font-size: 14px; }
            .nb-logo-tag { font-size: 8px; }
        }

        /* ── Dark mode overrides for logo & scrollbar ── */
        html.dark .nb-logo-tag { color: #60a5fa; }

        html.dark ::-webkit-scrollbar-track { background: #1e293b; }
        html.dark ::-webkit-scrollbar-thumb { background: #0288d1; }
    </style>
</head>

<body class="antialiased bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen relative overflow-x-hidden">

    <!-- ========== HEADER / LOGO - AquaBlast brand ========== -->
    <div class="fixed top-4 left-4 sm:top-6 sm:left-6 z-50 flex items-center gap-4">
        <!-- LOGO -->
        <a href="index.html" class="nb-logo" aria-label="ProWash Home">
          <div class="nb-logo-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/>
              <path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/>
            </svg>
          </div>
          <div class="nb-logo-text">
            <span class="nb-logo-name">ProWash</span>
            <span class="nb-logo-tag">Pressure & Soft Wash</span>
          </div>
        </a>
    </div>

    <!-- top-right tools: RTL + light/dark -->
    <div class="fixed top-4 right-4 sm:top-6 sm:right-6 z-50 flex items-center gap-3">
        <button id="rtlToggle" type="button" aria-label="Toggle RTL direction" class="w-10 h-10 rounded-full bg-white/70 dark:bg-slate-800/70 backdrop-blur-sm border border-[#00acc1]/40 dark:border-slate-600 flex items-center justify-center text-[#0288d1] dark:text-[#38bdf8] hover:bg-[#0288d1] dark:hover:bg-[#0288d1] hover:text-white transition-all shadow-md hover:shadow-lg">
            <span class="text-[11px] font-bold tracking-wide">RTL</span>
        </button>
        <button id="themeToggle" type="button" aria-label="Toggle theme" class="w-10 h-10 rounded-full bg-white/70 dark:bg-slate-800/70 backdrop-blur-sm border border-[#00acc1]/40 dark:border-slate-600 flex items-center justify-center text-[#0288d1] dark:text-[#38bdf8] hover:bg-[#0288d1] dark:hover:bg-[#0288d1] hover:text-white transition-all shadow-md">
            <i id="themeIcon" class="fas fa-water text-sm" aria-hidden="true"></i>
        </button>
    </div>

    <!-- MAIN LOGIN CARD -->
    <div class="relative z-10 min-h-screen w-full flex items-center justify-center px-4 py-24 md:py-12 ">
        <div class="w-full max-w-md transform transition-all duration-500">
            <!-- Clean white/dark card with perfect shadow -->
            <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-xl border border-gray-100 dark:border-slate-700/50 overflow-hidden p-6 sm:p-8 md:p-10 transition-all duration-300">
                
                <!-- Brand header with wave icon -->
                <div class="text-center mb-6 border-b border-gray-100 dark:border-slate-700 pb-6">
                    
                    <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-[#0288d1] to-[#00acc1] bg-clip-text text-transparent">Login to AquaBlast</h1>
                    <p class="text-[0.75rem] font-medium text-slate-500 dark:text-slate-400 mt-1.5 flex items-center justify-center gap-1">
                        <i class="fas fa-droplet text-[#00acc1] text-[9px]" aria-hidden="true"></i> dive into your dashboard
                    </p>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="space-y-5" novalidate>
                    <!-- Email field -->
                    <div>
                        <label for="email" class="block text-[11px] font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 mb-1.5 flex items-center gap-1.5">
                            <i class="fas fa-envelope text-[#00acc1] text-[12px]" aria-hidden="true"></i> Email Address
                        </label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none" aria-hidden="true">
                                <i class="fas fa-user-circle text-[#0288d1]/60 text-base group-focus-within:text-[#0288d1] transition-colors"></i>
                            </div>
                            <input type="email" id="email" required placeholder="hydro@aquablast.com" aria-required="true" autocomplete="email"
                                class="w-full pl-11 pr-4 py-3.5 bg-gray-50 dark:bg-slate-900/60 border border-gray-200 dark:border-slate-600 rounded-xl focus:border-[#0288d1] focus:ring-2 focus:ring-[#0288d1]/30 outline-none transition-all text-slate-800 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 text-[15px] shadow-sm">
                        </div>
                    </div>

                    <!-- Password field with eye toggle -->
                    <div>
                        <div class="flex items-center mb-1.5">
                            <label for="password" class="text-[11px] font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 flex items-center gap-1.5">
                                <i class="fas fa-key text-[#00acc1] text-[11px]" aria-hidden="true"></i> Password
                            </label>
                        </div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none" aria-hidden="true">
                                <i class="fas fa-lock text-[#0288d1]/60 text-sm"></i>
                            </div>
                            <input type="password" id="password" required placeholder="••••••••" aria-required="true" autocomplete="current-password"
                                class="w-full pl-11 pr-12 py-3.5 bg-gray-50 dark:bg-slate-900/60 border border-gray-200 dark:border-slate-600 rounded-xl focus:border-[#0288d1] focus:ring-2 focus:ring-[#0288d1]/30 outline-none transition-all text-slate-800 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 text-[15px] shadow-sm">
                            <button type="button" onclick="togglePassword()" aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-[#0288d1] transition-colors">
                                <i id="eyeIcon" class="fas fa-eye text-sm" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Remember & Reset row -->
                    <div class="flex items-center justify-between pt-1">
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <input type="checkbox" id="rememberCheck" class="w-4 h-4 rounded border-gray-300 dark:border-slate-600 text-[#0288d1] focus:ring-[#0288d1] focus:ring-offset-0 accent-[#0288d1] bg-white dark:bg-slate-700">
                            <span class="text-xs font-medium text-slate-600 dark:text-slate-300 group-hover:text-[#0288d1] dark:group-hover:text-[#38bdf8] transition-colors">Stay logged in</span>
                        </label>
                        <a href="#" id="resetPasswordLink" class="text-[10px] font-bold uppercase tracking-wide text-[#0288d1] dark:text-[#38bdf8] hover:text-[#00acc1] transition-colors">Reset Password?</a>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="loginSubmitBtn" aria-label="Log in to your account" class="aqua-glow-btn w-full mt-3 py-3.5 bg-gradient-to-r from-[#0288d1] to-[#00acc1] text-white rounded-xl font-bold text-sm uppercase tracking-wider shadow-lg hover:shadow-[#0288d1]/40 transition-all flex items-center justify-center gap-2 group">
                        <span>sign-in </span>
                        <i class="fas fa-arrow-right text-xs rtl-flip-icon group-hover:translate-x-1 transition-transform" aria-hidden="true"></i>
                    </button>
                </form>

                <!-- Divider with aqua droplets -->
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-100 dark:border-slate-700"></div>
                    </div>
                    <div class="relative flex justify-center text-xs">
                        <span class="px-3 bg-white dark:bg-slate-800 text-[#0288d1] dark:text-[#38bdf8] font-bold uppercase tracking-wider text-[10px] flex items-center gap-1">
                            <i class="fas fa-water" aria-hidden="true"></i> aqua connect <i class="fas fa-water" aria-hidden="true"></i>
                        </span>
                    </div>
                </div>

                <!-- social buttons -->
                <div class="grid grid-cols-2 gap-3">
                    <button id="googleLoginBtn" type="button" aria-label="Sign in with Google" class="flex items-center justify-center gap-2 py-2.5 px-3 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-600 rounded-xl hover:bg-blue-50 dark:hover:bg-slate-700 hover:border-[#0288d1] dark:hover:border-[#38bdf8] transition-all text-xs font-semibold text-slate-700 dark:text-slate-200">
                        <i class="fab fa-google text-[#ea4335] text-sm" aria-hidden="true"></i> Google
                    </button>
                    <button id="appleLoginBtn" type="button" aria-label="Sign in with Apple" class="flex items-center justify-center gap-2 py-2.5 px-3 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-600 rounded-xl hover:bg-blue-50 dark:hover:bg-slate-700 hover:border-[#0288d1] dark:hover:border-[#38bdf8] transition-all text-xs font-semibold text-slate-700 dark:text-slate-200">
                        <i class="fab fa-apple text-slate-800 dark:text-white text-sm" aria-hidden="true"></i> Apple
                    </button>
                </div>

                <!-- Sign up link -->
                <p class="mt-6 text-center text-[12px] text-slate-500 dark:text-slate-400">
                    New to AquaBlast? 
                    <a href="#" id="signupTrigger" class="font-extrabold text-[#0288d1] dark:text-[#38bdf8] hover:text-[#00acc1] border-b border-[#0288d1]/40 hover:border-[#00acc1] transition-all pb-0.5">Create account</a>
                </p>
                
                <!-- extra micro info -->
                <div class="mt-5 text-center text-[9px] text-slate-400 dark:text-slate-500 flex items-center justify-center gap-2">
                    <i class="fas fa-shield-alt text-[#00acc1]" aria-hidden="true"></i> secure login &bull; 256-bit encryption 
                    <i class="fas fa-droplet text-[#00acc1] ml-1" aria-hidden="true"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- success modal toast -->
    <div id="toastMessage" role="status" aria-live="polite" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900/90 backdrop-blur-lg text-white px-5 py-2.5 rounded-full shadow-xl flex items-center gap-2 text-sm font-medium z-50 transition-all duration-300 opacity-0 pointer-events-none">
        <i class="fas fa-circle-check text-[#00acc1]" aria-hidden="true"></i>
        <span id="toastText">Login successful! Redirecting...</span>
    </div>

    <script>
        // -------------------------------
        // 1. PASSWORD VISIBILITY TOGGLE
        // -------------------------------
        function togglePassword() {
            const passInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (!passInput) return;
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        // -------------------------------
        // 2. DARK MODE (Optimized with solid/radial dynamic toggle)
        // -------------------------------
        const htmlEl = document.documentElement;
        const themeBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        function updateBodyBackground(isDark) {
            if (isDark) {
                document.body.style.background = 'radial-gradient(circle at 10% 20%, #0f172a, #020617)';
            } else {
                document.body.style.background = '';
            }
        }

        function applyThemePreference() {
            const storedTheme = localStorage.getItem('aquablast-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = storedTheme === 'dark' || (storedTheme === null && prefersDark);
            
            if (isDark) {
                htmlEl.classList.add('dark');
                if(themeIcon) themeIcon.className = 'fas fa-moon text-sm';
                updateBodyBackground(true);
            } else {
                htmlEl.classList.remove('dark');
                if(themeIcon) themeIcon.className = 'fas fa-sun text-sm';
                updateBodyBackground(false);
            }
        }
        
        function toggleThemeMode() {
            if (htmlEl.classList.contains('dark')) {
                htmlEl.classList.remove('dark');
                localStorage.setItem('aquablast-theme', 'light');
                if(themeIcon) themeIcon.className = 'fas fa-sun text-sm';
                updateBodyBackground(false);
            } else {
                htmlEl.classList.add('dark');
                localStorage.setItem('aquablast-theme', 'dark');
                if(themeIcon) themeIcon.className = 'fas fa-moon text-sm';
                updateBodyBackground(true);
            }
        }
        
        if (themeBtn) themeBtn.addEventListener('click', toggleThemeMode);
        applyThemePreference();
        
        // MutationObserver to perfectly handle programmatic class updates
        const observer = new MutationObserver(() => {
            const isDark = htmlEl.classList.contains('dark');
            updateBodyBackground(isDark);
        });
        observer.observe(htmlEl, { attributes: true, attributeFilter: ['class'] });
        
        // -------------------------------
        // 3. RTL TOGGLE (full rtl support)
        // -------------------------------
        const rtlBtn = document.getElementById('rtlToggle');
        function setRTL(value) {
            if (value) {
                htmlEl.setAttribute('dir', 'rtl');
                localStorage.setItem('aquablast-rtl', 'true');
            } else {
                htmlEl.setAttribute('dir', 'ltr');
                localStorage.setItem('aquablast-rtl', 'false');
            }
        }
        function toggleRTL() {
            const currentDir = htmlEl.getAttribute('dir');
            if (currentDir === 'rtl') {
                setRTL(false);
            } else {
                setRTL(true);
            }
        }
        function applyStoredRTL() {
            const stored = localStorage.getItem('aquablast-rtl');
            if (stored === 'true') {
                htmlEl.setAttribute('dir', 'rtl');
            } else {
                htmlEl.setAttribute('dir', 'ltr');
            }
        }
        if (rtlBtn) rtlBtn.addEventListener('click', toggleRTL);
        applyStoredRTL();
        
        // -------------------------------
        // 4. FORM SUBMIT: Login simulation + redirect
        // -------------------------------
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('loginSubmitBtn');
        const toastDiv = document.getElementById('toastMessage');
        const toastTextSpan = document.getElementById('toastText');
        
        function showToast(message, isError = false) {
            if (!toastDiv) return;
            toastTextSpan.innerText = message;
            toastDiv.classList.remove('opacity-0', 'pointer-events-none');
            toastDiv.classList.add('opacity-100', 'pointer-events-auto');
            if (!isError) {
                toastDiv.style.backgroundColor = '#0f2b3dcc';
                toastDiv.style.backdropFilter = 'blur(10px)';
            } else {
                toastDiv.style.backgroundColor = '#9b2c2ccc';
            }
            setTimeout(() => {
                toastDiv.classList.add('opacity-0', 'pointer-events-none');
                toastDiv.classList.remove('opacity-100', 'pointer-events-auto');
            }, 2200);
        }
        
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const emailInput = document.getElementById('email');
            const pwdInput = document.getElementById('password');
            const email = emailInput.value.trim();
            const password = pwdInput.value.trim();
            
            if (!email) {
                showToast('⚠️ Please enter your email address', true);
                emailInput.classList.add('border-red-400', 'ring-1', 'ring-red-300');
                setTimeout(() => emailInput.classList.remove('border-red-400', 'ring-1', 'ring-red-300'), 1500);
                return;
            }
            if (!password) {
                showToast('🔒 Password cannot be empty', true);
                pwdInput.classList.add('border-red-400', 'ring-1', 'ring-red-300');
                setTimeout(() => pwdInput.classList.remove('border-red-400', 'ring-1', 'ring-red-300'), 1500);
                return;
            }
            if (password.length < 3) {
                showToast('💧 Password must be at least 3 characters', true);
                return;
            }
            
            // simulate loading state
            const originalBtnHtml = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> logging into AquaBlast...';
            submitBtn.classList.add('opacity-80', 'cursor-wait');
            
            setTimeout(() => {
                showToast('✅ Welcome back! Redirecting to dashboard...', false);
                localStorage.setItem('aquablast_logged_in', 'true');
                localStorage.setItem('aquablast_user_email', email);
                setTimeout(() => {
                    window.location.href = 'user.html'; 
                }, 800);
            }, 1300);
        });
        
        // "Signup here" click
        const signupTrigger = document.getElementById('signupTrigger');
        if (signupTrigger) {
            signupTrigger.addEventListener('click', (e) => {
                e.preventDefault();
                showToast('✨ Diving into registration! Redirect to signup page (AquaBlast).', false);
                setTimeout(() => {
                    window.location.href = 'signup.html';
                }, 800);
            });
        }
        
        // "Reset Password?" link handler
        const resetPwdLink = document.getElementById('resetPasswordLink');
        if (resetPwdLink) {
            resetPwdLink.addEventListener('click', (e) => {
                e.preventDefault();
                showToast('📧 AquaBlast recovery: check your email (demo flow)', false);
            });
        }
        
        // Social buttons click handler
        const socialBtns = document.querySelectorAll('.grid.grid-cols-2 button');
        socialBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                showToast(`🔵 ${btn.innerText.trim()} authentication — coming soon on AquaBlast`, false);
            });
        });
        
        // Remember me functionality
        const rememberMe = document.getElementById('rememberCheck');
        if (rememberMe && localStorage.getItem('aquablast_remember_email')) {
            const savedEmail = localStorage.getItem('aquablast_remember_email');
            if (savedEmail) document.getElementById('email').value = savedEmail;
            rememberMe.checked = true;
        }
        loginForm.addEventListener('submit', () => {
            if (rememberMe && rememberMe.checked) {
                const emailVal = document.getElementById('email').value;
                localStorage.setItem('aquablast_remember_email', emailVal);
            } else if (rememberMe) {
                localStorage.removeItem('aquablast_remember_email');
            }
        });
        
        console.log("AquaBlast Login — fully responsive, aqua color scheme, blue wave ready");
    </script>
</body>
</html>
