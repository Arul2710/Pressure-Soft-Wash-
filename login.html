<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pressure & Soft Wash • Login</title>
    <link rel="icon" type="img/jpg" href="img/growwpark-logo.jpg">
    <script src="tailwind.js"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS via CDN + custom config -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- custom override & smooth extras -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        }

        /* custom aqua blue shimmer animation */
        @keyframes aquaPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 172, 193, 0.3), 0 0 0 0 rgba(2, 136, 209, 0.2);
            }
            70% {
                box-shadow: 0 0 0 12px rgba(0, 172, 193, 0), 0 0 0 6px rgba(2, 136, 209, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(0, 172, 193, 0), 0 0 0 0 rgba(2, 136, 209, 0);
            }
        }

        .aqua-glow-btn {
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .aqua-glow-btn:hover {
            transform: translateY(-2px);
            animation: aquaPulse 1.2s infinite;
        }
        
        /* custom focus rings - fresh blue */
        input:focus {
            ring: none;
        }
        .focus-ring-aqua:focus {
            outline: none;
            border-color: #2cc1e0;
            box-shadow: 0 0 0 3px rgba(44, 193, 224, 0.3), 0 0 0 1px rgba(0, 150, 199, 0.2);
        }
        
        /* smooth bg animated gradient (subtle) */
        .aqua-bg-wave {
            background: radial-gradient(circle at 20% 30%, rgba(0, 180, 216, 0.08) 0%, rgba(2, 110, 148, 0.02) 90%);
        }
        
        /* custom scroll */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #eef2ff;
        }
        ::-webkit-scrollbar-thumb {
            background: #0288d1;
            border-radius: 12px;
        }
        
        /* RTL safe margins */
        [dir="rtl"] .rtl-flip {
            transform: scaleX(-1);
        }
        [dir="rtl"] .rtl-flip-icon {
            display: inline-block;
            transform: rotate(180deg);
        }


        :root {
            --nb-blue-600: #2563eb;
            --nb-slate-900: #0f172a;
            --nb-font: 'Plus Jakarta Sans', system-ui, sans-serif;
            --nb-ease: cubic-bezier(0.4, 0, 0.2, 1);
            --nb-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --nb-t-fast: 0.18s;
            --nb-t: 0.28s;
        }
        
 /* ── Logo ── */
  .nb-logo {
    display: flex;
    align-items: center;
    gap: 11px;
    text-decoration: none;
    flex-shrink: 0;
    transition: opacity var(--nb-t-fast);
  }
  .nb-logo:hover { opacity: 0.88; }

  .nb-logo-icon {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 18px rgba(37, 99, 235, 0.38);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    transition: transform var(--nb-t) var(--nb-spring),
                box-shadow var(--nb-t) var(--nb-ease);
  }

  .nb-logo-icon::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: conic-gradient(from 0deg, transparent 340deg, rgba(255,255,255,0.25) 360deg);
    animation: nb-spin 6s linear infinite;
  }

  @keyframes nb-spin { to { transform: rotate(360deg); } }

  .nb-logo:hover .nb-logo-icon {
    transform: scale(1.07) rotate(-4deg);
    box-shadow: 0 8px 28px rgba(37, 99, 235, 0.48);
  }

  .nb-logo-svg {
    position: relative;
    z-index: 1;
  }

  .nb-logo-text { display: flex; flex-direction: column; line-height: 1.15; }

  .nb-logo-name {
    font-family: var(--nb-font);
    font-size: 18px;
    font-weight: 800;
    color: var(--nb-slate-900);
    letter-spacing: -0.03em;
    white-space: nowrap;
  }

  .nb-logo-tag {
    font-family: var(--nb-font);
    font-size: 10px;
    font-weight: 600;
    color: var(--nb-blue-600);
    letter-spacing: 0.09em;
    text-transform: uppercase;
    white-space: nowrap;
  }



  @media (max-width: 640px) {
 
    .nb-logo-icon { width: 36px; height: 36px; border-radius: 10px; }
    .nb-logo-name { font-size: 16px; }
    .nb-logo-tag { font-size: 9px; }}
    </style>
</head>

<body class="antialiased bg-gradient-to-br from-[#EFF6FF] via-[#DBEAFE] to-[#BAE6FD] min-h-screen relative overflow-x-hidden">

    <!-- ========== HEADER / LOGO - AquaBlast brand ========== -->

    <!-- top-right tools: RTL + light/dark (but we keep full aqua style always fresh)-->

    <!-- MAIN LOGIN CARD -->
    <div class="relative z-10 min-h-screen w-full flex items-center justify-center px-4 py-24 md:py-12">
        <div class="w-full max-w-md transform transition-all duration-500">
            <!-- Glassmorphic floating card with deep aqua accents -->

                <!-- Brand header with wave icon -->

                    <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-gradient-to-br from-[#00acc1] to-[#0288d1] text-white shadow-md mb-3">

                    </div>
                    <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-[#0288d1] to-[#00acc1] bg-clip-text text-transparent">Login to AquaBlast</h1>
                    <p class="text-[0.75rem] font-medium text-slate-600 dark:text-slate-400 mt-1 flex items-center justify-center gap-1">

                <!-- Login Form -->

                    <!-- Email field with fresh aqua style -->

                        <label for="email" class="block text-[11px] font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 mb-1.5 flex items-center gap-1.5">

                            <input type="email" id="email" required placeholder="hydro@aquablast.com" 
                                class="w-full pl-11 pr-4 py-3.5 bg-white/90 dark:bg-slate-800/80 border border-[#7ad0e6]/60 rounded-xl focus:border-[#0288d1] focus:ring-2 focus:ring-[#0288d1]/30 outline-none transition-all text-slate-800 dark:text-white placeholder:text-slate-400 text-[15px] shadow-sm">

                    <!-- Password field with eye toggle -->

                            </label>
                            <a href="#" class="text-[10px] font-semibold text-[#0288d1] hover:text-[#00acc1] transition-colors">forgot flow?</a>
                        </div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">

                                class="w-full pl-11 pr-12 py-3.5 bg-white/90 dark:bg-slate-800/80 border border-[#7ad0e6]/60 rounded-xl focus:border-[#0288d1] focus:ring-2 focus:ring-[#0288d1]/30 outline-none transition-all text-slate-800 dark:text-white text-[15px] shadow-sm">
                            <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-[#0288d1] transition-colors">
                                <i id="eyeIcon" class="fas fa-eye text-sm"></i>

                    <!-- Remember & terms row -->

                    <!-- Submit Button - AQUA BLAST GLOW -->

                        <span>Log In</span>

                <!-- Divider with aqua droplets -->
                <div class="relative my-6">

                        <span class="px-3 bg-white/90 dark:bg-slate-900/80 text-[#0288d1] font-bold uppercase tracking-wider text-[10px] flex items-center gap-1">
                            <i class="fas fa-water"></i> aqua connect <i class="fas fa-water"></i>
                        </span>
                    </div>
                </div>

                <!-- social buttons styled with aqua border -->
                <div class="grid grid-cols-2 gap-3">
                    <button class="flex items-center justify-center gap-2 py-2.5 px-3 bg-white/90 dark:bg-slate-800/70 border border-[#00acc1]/30 rounded-xl hover:border-[#0288d1] hover:bg-white/100 transition-all text-xs font-semibold text-slate-700 dark:text-white group">
                        <i class="fab fa-google text-[#ea4335] text-sm"></i> Google
                    </button>
                    <button class="flex items-center justify-center gap-2 py-2.5 px-3 bg-white/90 dark:bg-slate-800/70 border border-[#00acc1]/30 rounded-xl hover:border-[#0288d1] hover:bg-white/100 transition-all text-xs font-semibold text-slate-700 dark:text-white">

                <!-- Sign up link -->
                <p class="mt-6 text-center text-[12px] text-slate-600 dark:text-slate-400">
                    New to AquaBlast? 
                    <a href="#" id="signupTrigger" class="font-extrabold text-[#0288d1] hover:text-[#00acc1] border-b border-[#0288d1]/40 hover:border-[#00acc1] transition-all pb-0.5">Create account</a>

    <!-- success modal toast (optional, but adds nice feedback) -->
    <div id="toastMessage" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900/90 backdrop-blur-lg text-white px-5 py-2.5 rounded-full shadow-xl flex items-center gap-2 text-sm font-medium z-50 transition-all duration-300 opacity-0 pointer-events-none">
        <i class="fas fa-circle-check text-[#00acc1]"></i>
        <span id="toastText">Login successful! Redirecting...</span>
    </div>

    <script>
        // -------------------------------
        // 1. PASSWORD VISIBILITY TOGGLE
        // -------------------------------
        function togglePassword() {
            const passInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (!passInput) return;
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        // -------------------------------
        // 2. DARK MODE (but keep aqua theme and also adapt background)
        // -------------------------------
        const htmlEl = document.documentElement;
        const themeBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        function applyThemePreference() {
            const storedTheme = localStorage.getItem('aquablast-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = storedTheme === 'dark' || (storedTheme === null && prefersDark);
            
            if (isDark) {
                htmlEl.classList.add('dark');
                if(themeIcon) themeIcon.className = 'fas fa-moon text-sm';
            } else {
                htmlEl.classList.remove('dark');
                if(themeIcon) themeIcon.className = 'fas fa-sun text-sm';
            }
        }
        
        function toggleThemeMode() {
            if (htmlEl.classList.contains('dark')) {
                htmlEl.classList.remove('dark');
                localStorage.setItem('aquablast-theme', 'light');
                if(themeIcon) themeIcon.className = 'fas fa-sun text-sm';
            } else {
                htmlEl.classList.add('dark');
                localStorage.setItem('aquablast-theme', 'dark');
                if(themeIcon) themeIcon.className = 'fas fa-moon text-sm';
            }
            // adjust background intensity for dark mode via body class
            document.body.classList.toggle('dark-mode-bg');
        }
        
        if (themeBtn) themeBtn.addEventListener('click', toggleThemeMode);
        applyThemePreference();
        
        // additional dynamic background tweak (just to keep aqua spirit)
        if (htmlEl.classList.contains('dark')) {
            document.body.style.background = 'radial-gradient(circle at 10% 20%, #0f172a, #020617)';
        } else {
            document.body.style.background = '';
        }
        
        // observe for style perfection
        const observer = new MutationObserver(() => {
            if (htmlEl.classList.contains('dark')) {
                document.body.style.background = 'radial-gradient(circle at 10% 20%, #0f172a, #020617)';
            } else {
                document.body.style.background = '';
            }
        });
        observer.observe(htmlEl, { attributes: true, attributeFilter: ['class'] });
        
        // -------------------------------
        // 3. RTL TOGGLE (full rtl support)
        // -------------------------------
        const rtlBtn = document.getElementById('rtlToggle');
        function setRTL(value) {
            if (value) {
                htmlEl.setAttribute('dir', 'rtl');
                localStorage.setItem('aquablast-rtl', 'true');
            } else {
                htmlEl.setAttribute('dir', 'ltr');
                localStorage.setItem('aquablast-rtl', 'false');
            }
        }
        function toggleRTL() {
            const currentDir = htmlEl.getAttribute('dir');
            if (currentDir === 'rtl') {
                setRTL(false);
            } else {
                setRTL(true);
            }
        }
        function applyStoredRTL() {
            const stored = localStorage.getItem('aquablast-rtl');
            if (stored === 'true') {
                htmlEl.setAttribute('dir', 'rtl');
            } else if (stored === 'false') {
                htmlEl.setAttribute('dir', 'ltr');
            } else {
                htmlEl.setAttribute('dir', 'ltr');
            }
        }
        if (rtlBtn) rtlBtn.addEventListener('click', toggleRTL);
        applyStoredRTL();
        
        // -------------------------------
        // 4. FORM SUBMIT: full responsive login simulation + redirect to "user dashboard" 
        //    with full aqua flavor + success animation
        // -------------------------------
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('loginSubmitBtn');
        const toastDiv = document.getElementById('toastMessage');
        const toastTextSpan = document.getElementById('toastText');
        
        function showToast(message, isError = false) {
            if (!toastDiv) return;
            toastTextSpan.innerText = message;
            toastDiv.classList.remove('opacity-0', 'pointer-events-none');
            toastDiv.classList.add('opacity-100', 'pointer-events-auto');
            if (!isError) {
                toastDiv.style.backgroundColor = '#0f2b3dcc';
                toastDiv.style.backdropFilter = 'blur(10px)';
            } else {
                toastDiv.style.backgroundColor = '#9b2c2ccc';
            }
            setTimeout(() => {
                toastDiv.classList.add('opacity-0', 'pointer-events-none');
                toastDiv.classList.remove('opacity-100', 'pointer-events-auto');
            }, 2200);
        }
        
        // simple validation (mock demo)
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const emailInput = document.getElementById('email');
            const pwdInput = document.getElementById('password');
            const email = emailInput.value.trim();
            const password = pwdInput.value.trim();
            
            if (!email) {
                showToast('⚠️ Please enter your email address', true);
                emailInput.classList.add('border-red-400', 'ring-1', 'ring-red-300');
                setTimeout(() => emailInput.classList.remove('border-red-400', 'ring-1', 'ring-red-300'), 1500);
                return;
            }
            if (!password) {
                showToast('🔒 Password cannot be empty', true);
                pwdInput.classList.add('border-red-400', 'ring-1', 'ring-red-300');
                setTimeout(() => pwdInput.classList.remove('border-red-400', 'ring-1', 'ring-red-300'), 1500);
                return;
            }
            if (password.length < 3) {
                showToast('💧 Password must be at least 3 characters', true);
                return;
            }
            
            // simulate loading state
            const originalBtnHtml = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> logging into AquaBlast...';
            submitBtn.classList.add('opacity-80', 'cursor-wait');
            
            // mock async request
            setTimeout(() => {
                // success - redirect to user dashboard (user.html) but first show toast
                showToast('✅ Welcome back! Redirecting to dashboard...', false);
                // store a flag for logged in simulation
                localStorage.setItem('aquablast_logged_in', 'true');
                localStorage.setItem('aquablast_user_email', email);
                // redirect after smooth delay
                setTimeout(() => {
                    // create a demo user dashboard page (simulate internal navigation)
                    // for production, you can redirect to user.html as the spec, but to create full response
                    // we will redirect to "user.html" like original requested but since we need robust, 
                    // also if user.html not exists, we create dynamic fallback? But according requirement: "next adhal eruka log nemas AquaBlast name logs erukanum okva"
                    // Means we simulate redirection to user.html page — but full responsive page within same context? We'll do redirect.
                    // however to make experience seamless and respect original demand (edha logi yalam apdiya erukanum coler blu coler), we redirect
                    window.location.href = 'user.html'; 
                    // but if user.html is missing we also can create dynamic fallback, but since this is login, 
                    // just in case we provide alternative after 1.2 secs, but ideally it's part of project.
                    // For demo: if redirection fails due to missing file, we console; but typical environment test works.
                }, 800);
            }, 1300);
        });
        
        // "Signup here" click - if signup page redirection (signup.html) but to keep demo: we show alert with signup style
        const signupTrigger = document.getElementById('signupTrigger');
        if (signupTrigger) {
            signupTrigger.addEventListener('click', (e) => {
                e.preventDefault();
                showToast('✨ Diving into registration! Redirect to signup page (AquaBlast).', false);
                setTimeout(() => {
                    window.location.href = 'signup.html';
                }, 800);
            });
        }
        
        // optional "forgot password" dummy friendly interaction
        const forgotLinks = document.querySelectorAll('a[href="#"]');
        forgotLinks.forEach(link => {
            if (link.innerText.toLowerCase().includes('forgot') || link.innerText.toLowerCase().includes('reset')) {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    showToast('📧 AquaBlast recovery: check your email (demo flow)', false);
                });
            }
        });
        
        // extra: if the user clicks on social buttons (Google/Apple) also show fresh toast info
        const socialBtns = document.querySelectorAll('.grid.grid-cols-2 button');
        socialBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                showToast(`🔵 ${btn.innerText.trim()} authentication — coming soon on AquaBlast`, false);
            });
        });
        
        // set remember me functionality mock (stores in localStorage just for ui)
        const rememberMe = document.getElementById('rememberCheck');
        if (rememberMe && localStorage.getItem('aquablast_remember_email')) {
            const savedEmail = localStorage.getItem('aquablast_remember_email');
            if (savedEmail) document.getElementById('email').value = savedEmail;
            rememberMe.checked = true;
        }
        loginForm.addEventListener('submit', () => {
            if (rememberMe && rememberMe.checked) {
                const emailVal = document.getElementById('email').value;
                localStorage.setItem('aquablast_remember_email', emailVal);
            } else if (rememberMe) {
                localStorage.removeItem('aquablast_remember_email');
            }
        });
        
        // minor: preload any leftover theme handling for RTL icons consistency
        console.log("AquaBlast Login — fully responsive, aqua color scheme, blue wave ready");
    </script>
</body>
</html>
